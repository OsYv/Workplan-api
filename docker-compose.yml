services:
  db:
    image: postgres:16
    container_name: workplan_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: workplan
    ports:
      - "15432:5432"
    volumes:
      - /volume1/docker/workplan-api/postgres-data:/var/lib/postgresql/data

  api:
    build: .
    container_name: workplan_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
    depends_on:
      - db
    ports:
      - "8000:8000"
    volumes:
      - /volume1/docker/workplan-api:/app
    command: >
      sh -c "
      uvicorn app.main:app --host 0.0.0.0 --port 8000
      --proxy-headers --forwarded-allow-ips='*' --log-level info
      "
  web:
    image: node:20-alpine
    container_name: workplan_web
    restart: unless-stopped
    working_dir: /web
    volumes:
      - /volume1/docker/workplan-api/web:/web
    environment:
      NEXT_PUBLIC_API_BASE: "https://api.oswald-it.ch"
    ports:
      - "3000:3000"

    command: >
      sh -c "
      uvicorn app.main:app --host 0.0.0.0 --port 8000
      --proxy-headers --forwarded-allow-ips='*'
       "

